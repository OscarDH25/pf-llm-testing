apiVersion: apps/v1
kind: Deployment
metadata:
  name: pf-llm-testing-app
  namespace: pf-llm-testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pf-llm-testing-app
  template:
    metadata:
      labels:
        app: pf-llm-testing-app
    spec:
      containers:
        - name: api
          image: pf-llm-testing-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: pf-llm-testing-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
